<!DOCTYPE html>
<html>
<head>
  <title>Pixel Editor with Auto-Crop</title>
  <style>
    body {
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    canvas {
      border: 1px dashed #555;
    }
  </style>
</head>
<body>
  <h1>Auto-Cropping and Converting Spin Icon...</h1>
  <canvas id="canvas" tabindex="0" onclick="console.log('canvas clicked')"></canvas>
  <script>
    const img = new Image();
    
    img.onload = () => {
      console.log('Image loaded successfully. Dimensions:', img.width, 'x', img.height);
      
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = img.width;
      tempCanvas.height = img.height;
      tempCtx.drawImage(img, 0, 0);
      
      const imgData = tempCtx.getImageData(0, 0, img.width, img.height);
      const data = imgData.data;
      const width = img.width;
      const height = img.height;
      
      // Scan to find the bounding box of the wheel
      let minX = width, maxX = 0, minY = height, maxY = 0;
      const margin = 25; // Exclude Dropbox UI lines near borders
      
      for (let y = margin; y < height - margin; y++) {
        for (let x = margin; x < width - margin; x++) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx+1];
          const b = data[idx+2];
          
          // If the pixel is not the light grey/white background
          if (r < 200 && g < 200 && b < 200) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      
      // Add a small 2px padding
      minX = Math.max(0, minX - 2);
      minY = Math.max(0, minY - 2);
      maxX = Math.min(width, maxX + 2);
      maxY = Math.min(height, maxY + 2);
      
      const cropWidth = maxX - minX;
      const cropHeight = maxY - minY;
      
      console.log('Cropping bounds:', { minX, maxX, minY, maxY, cropWidth, cropHeight });
      
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = cropWidth;
      canvas.height = cropHeight;
      
      ctx.drawImage(img, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
      
      const croppedImgData = ctx.getImageData(0, 0, cropWidth, cropHeight);
      const croppedData = croppedImgData.data;
      
      for (let i = 0; i < croppedData.length; i += 4) {
        const r = croppedData[i];
        const g = croppedData[i+1];
        const b = croppedData[i+2];
        const a = croppedData[i+3];
        
        // Preserve already transparent pixels
        if (a === 0) {
          continue;
        }
        
        // If the pixel is very light (background or white wedges inside wheel)
        if (r > 200 && g > 200 && b > 200) {
          croppedData[i+3] = 0; // Make transparent
        } else {
          // Change wheel spokes/pedestal to pure white
          croppedData[i] = 255;
          croppedData[i+1] = 255;
          croppedData[i+2] = 255;
          croppedData[i+3] = 255;
        }
      }
      
      ctx.putImageData(croppedImgData, 0, 0);
      
      // Post to our local helper server
      const processedDataURL = canvas.toDataURL('image/png');
      fetch('http://localhost:3002/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: processedDataURL })
      })
      .then(res => res.json())
      .then(data => {
        console.log('Successfully saved to server!', data);
        document.body.innerHTML += '<h2>Saved and Cropped Successfully!</h2>';
      })
      .catch(err => {
        console.error('Error saving to server:', err);
        document.body.innerHTML += '<h2 style="color: red;">Error saving to server!</h2>';
      });
    };
